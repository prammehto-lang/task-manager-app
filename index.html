<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cloud Task Management Enterprise App">
    <meta name="theme-color" content="#1a1a2e">
    <title>TaskFlow Enterprise</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FullCalendar CDN -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-cloud-bolt"></i>
                <h2>TaskFlow En.</h2>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" data-view="dashboardView"><i class="fa-solid fa-layer-group"></i> Tasks</li>
                <li class="nav-item" data-view="calendarView"><i class="fa-regular fa-calendar-days"></i> Calendar</li>
                <li class="nav-item" data-view="analyticsView"><i class="fa-solid fa-chart-pie"></i> Analytics</li>
                <li class="nav-item" data-view="teamView"><i class="fa-solid fa-users-gear"></i> Team Admin</li>
            </ul>
        </nav>

        <!-- Main Workspace -->
        <main class="main-workspace">
            <!-- Header -->
            <header class="app-header">
                <div>
                    <h1>Welcome, Manager</h1>
                    <p class="tagline">Cloud synchronization active 🟢</p>
                </div>
                <div class="controls">
                    <button id="notificationBtn" class="btn btn-outline" title="Enable Notifications">
                        <i class="fa-solid fa-bell"></i> Enable Alerts
                    </button>
                    <button id="exportBtn" class="btn btn-outline" title="Export to CSV">
                        <i class="fa-solid fa-download"></i> Export
                    </button>
                </div>
            </header>

            <!-- VIEW 1: Task Dashboard -->
            <section id="dashboardView" class="view-section active-view">
                <div class="task-form-section section-glass">
                    <h2><i class="fa-solid fa-plus-circle"></i> Assign New Task</h2>
                    <form id="taskForm">
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="taskName">Task Name</label>
                                <input type="text" id="taskName" required placeholder="e.g., Q3 Budget Review">
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskAssignedTo">Assigned To (Select from Team)</label>
                                <select id="taskAssignedTo" required>
                                    <option value="" disabled selected>Select Employee</option>
                                    <!-- Populated from DB -->
                                </select>
                            </div>
                            <!-- Hidden inputs for auto-filled mobile/email to support legacy saving logic -->
                            <input type="hidden" id="taskEmployeeMobile">
                            <input type="hidden" id="taskEmployeeEmail">

                            <div class="form-group">
                                <label for="taskAssignedBy">Assigned By (Manager)</label>
                                <select id="taskAssignedBy" required>
                                    <option value="" disabled selected>Select Admin</option>
                                    <!-- Populated from DB -->
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                             <div class="form-group">
                                <label for="taskStartDate">Start Date & Time</label>
                                <input type="datetime-local" id="taskStartDate" required>
                            </div>
                            <div class="form-group">
                                <label for="taskDueDate">Due Date & Time ⏰</label>
                                <input type="datetime-local" id="taskDueDate" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskPriority">Priority</label>
                                <select id="taskPriority" required>
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="taskStatus">Initial Status</label>
                                <select id="taskStatus" required>
                                    <option value="Pending" selected>Pending</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="taskReminder">Reminder Frequency</label>
                                <select id="taskReminder" required>
                                    <option value="1800000">Every 30 min</option>
                                    <option value="3600000">Every 1 hour</option>
                                    <option value="86400000">Every Day</option>
                                    <option value="60000">Test: Every 1 Minute</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="taskRemarks">Remarks</label>
                                <textarea id="taskRemarks" rows="2" placeholder="Instructions..."></textarea>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-paper-plane"></i> Assign & Start Auto-Reminders
                            </button>
                        </div>
                    </form>
                </div>

                <div class="task-list-section section-glass" style="margin-top: 2rem;">
                    <div class="list-header">
                        <h2><i class="fa-solid fa-list-check"></i> Active CRM Assignments</h2>
                        <div class="filter-controls">
                            <input type="text" id="searchFilter" placeholder="Search tasks...">
                            <select id="statusFilter">
                                <option value="All">All</option>
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>
                    <div class="task-grid" id="taskGrid"></div>
                </div>
            </section>

            <!-- VIEW 2: Calendar -->
            <section id="calendarView" class="view-section">
                <div class="section-glass" style="height: 80vh; display: flex; flex-direction: column;">
                    <h2><i class="fa-regular fa-calendar-days"></i> Master Calendar</h2>
                    <div id="calendar" style="flex: 1; margin-top: 1rem; color: #fff;"></div>
                </div>
            </section>

            <!-- VIEW 3: Analytics -->
            <section id="analyticsView" class="view-section">
                <div class="analytics-grid">
                    <div class="section-glass">
                        <h2><i class="fa-solid fa-chart-pie"></i> Task Status Overview</h2>
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="section-glass">
                        <h2><i class="fa-solid fa-users"></i> Tasks by Employee</h2>
                        <canvas id="employeeChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- VIEW 4: Team Admin -->
            <section id="teamView" class="view-section">
                <div class="team-layout">
                    <div class="section-glass">
                        <h2><i class="fa-solid fa-user-plus"></i> Add Team Member</h2>
                        <form id="teamForm">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="teamName" required>
                            </div>
                            <div class="form-group">
                                <label>WhatsApp Mobile (Include Country Code)</label>
                                <input type="tel" id="teamMobile" required placeholder="919876543210">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="teamEmail" required>
                            </div>
                            <div class="form-group">
                                <label>Role</label>
                                <select id="teamRole" required>
                                    <option value="Employee">Employee</option>
                                    <option value="Manager">Manager</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Save Member</button>
                        </form>
                    </div>
                    
                    <div class="section-glass">
                        <h2><i class="fa-solid fa-address-book"></i> Active Directory</h2>
                        <div class="team-list" id="teamList">
                            <!-- Team Cards populated from DB -->
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Chart.JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Use module to enable Firebase v9 standard imports -->
    <script type="module" src="app.js"></script>
</body>
</html>
